<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Private Vault{% endblock %}</title>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #0b0f1a;
            --bg-surface: #131a2b;
            --bg-card: #1a2338;
            --bg-card-hover: #212d45;
            --bg-input: #0f1628;
            --border: #2a3a5a;
            --border-light: #3a5070;

            --text-primary: #edf2f7;
            --text-secondary: #b8c8e8;
            --text-muted: #6a8aaa;
            --text-dim: #4a6a8a;

            --accent: #7c5cfc;
            --accent-hover: #6b4be8;
            --accent-glow: rgba(124, 92, 252, 0.15);

            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;

            --radius: 16px;
            --radius-sm: 10px;
            --radius-lg: 24px;

            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.6);

            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-body);
            padding: 24px;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }

        .login-box .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-box .brand .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .login-box .brand h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #5b8def);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-box .brand p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .login-box .field {
            margin-bottom: 18px;
        }

        .login-box .field label {
            display: block;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .login-box .field input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 15px;
            transition: var(--transition);
        }

        .login-box .field input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .login-box .field input::placeholder {
            color: var(--text-dim);
        }

        .login-box .btn-primary {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .login-box .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(124, 92, 252, 0.3);
        }

        .login-box .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-box .error-msg {
            color: var(--danger);
            text-align: center;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .login-box .error-msg.show {
            display: block;
        }

        .login-box .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-dim);
        }
    </style>

    {% block extra_styles %}{% endblock %}
</head>

<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="brand">
                <span class="icon">🔐</span>
                <h1>Private Vault</h1>
                <p>{% block subtitle %}Secure your personal data{% endblock %}</p>
            </div>

            <div id="loginError" class="error-msg"></div>

            {% block content %}{% endblock %}

            <div class="footer-text">
                <span>🔒 End-to-end encrypted</span>
            </div>
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
