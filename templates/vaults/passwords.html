{% extends "base.html" %}

{% block page_title %}Password Vault{% endblock %}
{% block page_subtitle %}Manage your saved accounts clearly{% endblock %}

{% block content %}
<style>
    .pv-wrap {
        display: grid;
        gap: 14px;
    }

    .pv-header {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
    }

    .pv-header h2 {
        margin: 0;
        color: var(--text-primary);
        font-size: 20px;
        font-weight: 700;
    }

    .pv-header p {
        margin: 4px 0 0;
        color: var(--text-muted);
        font-size: 12px;
    }

    .pv-add {
        padding: 9px 15px;
        border-radius: var(--radius);
        border: 1px solid var(--accent);
        background: rgba(108, 140, 255, 0.12);
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
    }

    .pv-search input {
        width: 100%;
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-primary);
        border-radius: var(--radius);
        padding: 10px 13px;
        outline: none;
        font-size: 13px;
    }

    .pv-filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .filter-btn {
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-muted);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
        cursor: pointer;
    }

    .filter-btn.active,
    .filter-btn:hover {
        color: var(--accent);
        border-color: var(--accent);
        background: rgba(108, 140, 255, 0.1);
    }

    .pv-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(235px, 1fr));
        gap: 12px;
    }

    .pv-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 13px;
        cursor: pointer;
        transition: var(--transition);
    }

    .pv-card:hover {
        border-color: var(--border-light);
        transform: translateY(-2px);
    }

    .pv-top {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
    }

    .pv-icon {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 19px;
    }

    .pv-main {
        flex: 1;
        min-width: 0;
    }

    .pv-title {
        color: var(--text-primary);
        font-size: 15px;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .pv-sub {
        color: var(--text-muted);
        font-size: 12px;
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .fav-btn {
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-size: 16px;
        cursor: pointer;
    }

    .fav-btn.active {
        color: #fbbf24;
    }

    .pv-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 7px 0;
        border-top: 1px solid var(--border);
        font-size: 12px;
    }

    .pv-row span:first-child {
        color: var(--text-muted);
        flex-shrink: 0;
    }

    .pv-row span:last-child {
        color: var(--text-primary);
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .pv-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
        margin-top: 10px;
    }

    .pv-actions button {
        border: none;
        border-radius: var(--radius);
        padding: 7px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
    }

    .edit-btn {
        background: rgba(108, 140, 255, 0.12);
        color: var(--accent);
    }

    .del-btn {
        background: rgba(248, 113, 113, 0.12);
        color: var(--danger);
    }

    .pv-empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 35px;
        border: 1px dashed var(--border);
        border-radius: var(--radius-lg);
        color: var(--text-muted);
        background: var(--bg-card);
    }

    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.82);
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .modal-overlay.show {
        display: flex;
    }

    .modal-box {
        width: 100%;
        max-width: 540px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 22px;
        position: relative;
    }

    .modal-box.small {
        max-width: 560px;
    }

    .modal-box h2 {
        margin: 0 0 15px;
        color: var(--text-primary);
        font-size: 19px;
    }

    .x-close {
        position: absolute;
        top: 16px;
        right: 18px;
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-size: 22px;
        cursor: pointer;
    }

    .x-close:hover {
        color: var(--danger);
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 11px;
    }

    .field.full {
        grid-column: 1 / -1;
    }

    .field label {
        display: block;
        color: var(--text-secondary);
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 5px;
        text-transform: uppercase;
    }

    .field input,
    .field select {
        width: 100%;
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: var(--text-primary);
        border-radius: var(--radius);
        padding: 9px 11px;
        outline: none;
        font-size: 13px;
    }

    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 9px;
        margin-top: 16px;
        padding-top: 15px;
        border-top: 1px solid var(--border);
    }

    .modal-actions button {
        border: none;
        border-radius: var(--radius);
        padding: 8px 15px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
    }

    .cancel-btn {
        background: var(--bg-input);
        color: var(--text-muted);
    }

    .save-btn {
        background: rgba(108, 140, 255, 0.14);
        color: var(--accent);
        border: 1px solid rgba(108, 140, 255, 0.35) !important;
    }

    .detail-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
    }

    .detail-item {
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        font-size: 14px;
    }

    .detail-item .lbl {
        color: var(--text-muted);
        flex-shrink: 0;
    }

    .detail-item .val {
        color: var(--text-primary);
        text-align: right;
        word-break: break-word;
        font-weight: 600;
    }

    .pass-detail {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .icon-btn {
        border: none;
        background: rgba(108, 140, 255, 0.12);
        color: var(--accent);
        border-radius: 8px;
        padding: 6px 8px;
        cursor: pointer;
        font-size: 13px;
    }

    @media (max-width: 650px) {
        .pv-header {
            flex-direction: column;
            align-items: stretch;
        }

        .form-grid {
            grid-template-columns: 1fr;
        }

        .field.full {
            grid-column: auto;
        }
    }
</style>

<div class="pv-wrap">
    <div class="pv-header">
        <div>
            <h2>🔐 Password Vault</h2>
            <p>Gmail, social, gaming, business and research accounts.</p>
        </div>
        <button class="pv-add" onclick="openAdd()">+ Add Password</button>
    </div>

    <div class="pv-search">
        <input type="text" id="searchPwd" placeholder="Search Gmail, email, username, phone, recovery...">
    </div>

    <div class="pv-filters">
        <button class="filter-btn active" data-category="all" onclick="filterCategory('all')">All</button>
        <button class="filter-btn" data-category="Gmail" onclick="filterCategory('Gmail')">📧 Gmail</button>
        <button class="filter-btn" data-category="Social" onclick="filterCategory('Social')">👥 Social</button>
        <button class="filter-btn" data-category="Gaming" onclick="filterCategory('Gaming')">🎮 Gaming</button>
        <button class="filter-btn" data-category="Business" onclick="filterCategory('Business')">💼 Business</button>
        <button class="filter-btn" data-category="Research" onclick="filterCategory('Research')">🔬 Research</button>
    </div>

    <div class="pv-grid" id="passwordGrid"></div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-box">
        <button class="x-close" onclick="closeAdd()">×</button>
        <h2>Add Password</h2>

        <form id="addForm">
            <div class="form-grid">
                <div class="field full">
                    <label>Account Type</label>
                    <select id="addCategory" onchange="toggleFields('add')">
                        <option value="Gmail">📧 Gmail</option>
                        <option value="Social">👥 Social</option>
                        <option value="Gaming">🎮 Gaming</option>
                        <option value="Business">💼 Business</option>
                        <option value="Research">🔬 Research</option>
                    </select>
                </div>

                <div class="field full">
                    <label>Title</label>
                    <input type="text" id="addTitle" placeholder="Main Gmail, Discord, Steam, Research account">
                </div>

                <div class="field full normal-field">
                    <label>Used Email</label>
                    <input type="text" id="addUsedEmail" placeholder="Email used for this account">
                </div>

                <div class="field full normal-field">
                    <label>Username</label>
                    <input type="text" id="addUsername" placeholder="Username">
                </div>

                <div class="field full gmail-field">
                    <label>Gmail</label>
                    <input type="text" id="addGmail" placeholder="yourgmail@gmail.com">
                </div>

                <div class="field gmail-field">
                    <label>Phone Number</label>
                    <input type="text" id="addPhone" placeholder="Recovery phone number">
                </div>

                <div class="field gmail-field">
                    <label>Recovery Gmail</label>
                    <input type="text" id="addRecoveryGmail" placeholder="Recovery Gmail">
                </div>

                <div class="field full">
                    <label>Password</label>
                    <input type="password" id="addPassword" placeholder="Password" required>
                </div>

                <div class="field full">
                    <label>Purpose</label>
                    <input type="text" id="addPurpose"
                        placeholder="For gaming, main account, college, research, business...">
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="cancel-btn" onclick="closeAdd()">Cancel</button>
                <button type="submit" class="save-btn">Save</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <button class="x-close" onclick="closeEdit()">×</button>
        <h2>Edit Password</h2>

        <form id="editForm">
            <input type="hidden" id="editId">

            <div class="form-grid">
                <div class="field full">
                    <label>Account Type</label>
                    <select id="editCategory" onchange="toggleFields('edit')">
                        <option value="Gmail">📧 Gmail</option>
                        <option value="Social">👥 Social</option>
                        <option value="Gaming">🎮 Gaming</option>
                        <option value="Business">💼 Business</option>
                        <option value="Research">🔬 Research</option>
                    </select>
                </div>

                <div class="field full">
                    <label>Title</label>
                    <input type="text" id="editTitle">
                </div>

                <div class="field full normal-field-edit">
                    <label>Used Email</label>
                    <input type="text" id="editUsedEmail">
                </div>

                <div class="field full normal-field-edit">
                    <label>Username</label>
                    <input type="text" id="editUsername">
                </div>

                <div class="field full gmail-field-edit">
                    <label>Gmail</label>
                    <input type="text" id="editGmail">
                </div>

                <div class="field gmail-field-edit">
                    <label>Phone Number</label>
                    <input type="text" id="editPhone">
                </div>

                <div class="field gmail-field-edit">
                    <label>Recovery Gmail</label>
                    <input type="text" id="editRecoveryGmail">
                </div>

                <div class="field full">
                    <label>Password</label>
                    <input type="password" id="editPassword" required>
                </div>

                <div class="field full">
                    <label>Purpose</label>
                    <input type="text" id="editPurpose">
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="cancel-btn" onclick="closeEdit()">Cancel</button>
                <button type="submit" class="save-btn">Update</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="detailsModal">
    <div class="modal-box small">
        <button class="x-close" onclick="closeDetails()">×</button>
        <h2 id="detailTitle">Details</h2>
        <div class="detail-list" id="detailList"></div>
    </div>
</div>

<script>
    const csrf = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');

    let allItems = [];
    let currentFilter = 'all';
    let currentDetailId = null;
    let detailPasswordVisible = false;

    const icons = {
        Gmail: '📧',
        Social: '👥',
        Gaming: '🎮',
        Business: '💼',
        Research: '🔬'
    };

    function escapeHtml(v) {
        return String(v || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function maskPassword(v) {
        if (!v) return '••••••';
        return '•'.repeat(Math.min(v.length, 12));
    }

    function loadItems() {
        fetch('/passwords/list')
            .then(r => r.json())
            .then(d => {
                allItems = d.items || [];
                renderItems();
            });
    }

    function getExtra(item) {
        return item.extra || {};
    }

    function getCategory(item) {
        return getExtra(item).category || 'Gmail';
    }

    function getCardTitle(item) {
        const extra = getExtra(item);
        const cat = getCategory(item);

        if (cat === 'Gmail') return extra.title || item.label || extra.gmail || 'Gmail';
        return extra.title || item.label || cat;
    }

    function getCardSub(item) {
        const extra = getExtra(item);
        const cat = getCategory(item);

        if (cat === 'Gmail') return extra.gmail || item.label || 'No Gmail';
        return extra.used_email || extra.username || 'No email';
    }

    function renderItems() {
        const grid = document.getElementById('passwordGrid');
        const q = document.getElementById('searchPwd').value.toLowerCase();

        let items = allItems.filter(item => {
            const extra = getExtra(item);
            const cat = getCategory(item);

            const searchText = `
                ${item.label || ''}
                ${item.value || ''}
                ${item.notes || ''}
                ${cat}
                ${extra.title || ''}
                ${extra.used_email || ''}
                ${extra.username || ''}
                ${extra.gmail || ''}
                ${extra.phone || ''}
                ${extra.recovery_gmail || ''}
                ${extra.purpose || ''}
            `.toLowerCase();

            return (currentFilter === 'all' || cat === currentFilter) && searchText.includes(q);
        });

        if (items.length === 0) {
            grid.innerHTML = `<div class="pv-empty">No password saved yet.</div>`;
            return;
        }

        grid.innerHTML = items.map(item => {
            const extra = getExtra(item);
            const cat = getCategory(item);
            const icon = icons[cat] || '🔐';

            if (cat === 'Gmail') {
                return `
                    <div class="pv-card" onclick="openDetails(${item.id})">
                        <div class="pv-top">
                            <div class="pv-icon">${icon}</div>
                            <div class="pv-main">
                                <div class="pv-title">${escapeHtml(getCardTitle(item))}</div>
                                <div class="pv-sub">${escapeHtml(extra.gmail || item.label || 'No Gmail')}</div>
                            </div>
                            <button class="fav-btn ${item.is_favorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav(${item.id})">${item.is_favorite ? '⭐' : '☆'}</button>
                        </div>

                        <div class="pv-row"><span>Gmail</span><span>${escapeHtml(extra.gmail || item.label || '—')}</span></div>
                        <div class="pv-row"><span>Password</span><span>${maskPassword(item.value)}</span></div>
                        <div class="pv-row"><span>Phone</span><span>${escapeHtml(extra.phone || '—')}</span></div>
                        <div class="pv-row"><span>Recovery</span><span>${escapeHtml(extra.recovery_gmail || '—')}</span></div>

                        <div class="pv-actions" onclick="event.stopPropagation();">
                            <button class="edit-btn" onclick="openEdit(${item.id})">Edit</button>
                            <button class="del-btn" onclick="deleteItem(${item.id})">Delete</button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="pv-card" onclick="openDetails(${item.id})">
                    <div class="pv-top">
                        <div class="pv-icon">${icon}</div>
                        <div class="pv-main">
                            <div class="pv-title">${escapeHtml(getCardTitle(item))}</div>
                            <div class="pv-sub">${escapeHtml(extra.used_email || extra.username || 'No email')}</div>
                        </div>
                        <button class="fav-btn ${item.is_favorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav(${item.id})">${item.is_favorite ? '⭐' : '☆'}</button>
                    </div>

                    <div class="pv-row"><span>Used Email</span><span>${escapeHtml(extra.used_email || '—')}</span></div>
                    <div class="pv-row"><span>Username</span><span>${escapeHtml(extra.username || '—')}</span></div>
                    <div class="pv-row"><span>Password</span><span>${maskPassword(item.value)}</span></div>
                    <div class="pv-row"><span>Purpose</span><span>${escapeHtml(extra.purpose || item.notes || '—')}</span></div>

                    <div class="pv-actions" onclick="event.stopPropagation();">
                        <button class="edit-btn" onclick="openEdit(${item.id})">Edit</button>
                        <button class="del-btn" onclick="deleteItem(${item.id})">Delete</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function filterCategory(category) {
        currentFilter = category;

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.category === category);
        });

        renderItems();
    }

    function toggleFields(mode) {
        const category = document.getElementById(mode + 'Category').value;
        const normalClass = mode === 'add' ? '.normal-field' : '.normal-field-edit';
        const gmailClass = mode === 'add' ? '.gmail-field' : '.gmail-field-edit';

        document.querySelectorAll(normalClass).forEach(el => {
            el.style.display = category === 'Gmail' ? 'none' : 'block';
        });

        document.querySelectorAll(gmailClass).forEach(el => {
            el.style.display = category === 'Gmail' ? 'block' : 'none';
        });
    }

    function openAdd() {
        document.getElementById('addForm').reset();
        document.getElementById('addCategory').value = 'Gmail';
        toggleFields('add');
        document.getElementById('addModal').classList.add('show');
    }

    function closeAdd() {
        document.getElementById('addModal').classList.remove('show');
    }

    document.getElementById('addForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const category = document.getElementById('addCategory').value;
        const title = document.getElementById('addTitle').value.trim();
        const password = document.getElementById('addPassword').value.trim();
        const purpose = document.getElementById('addPurpose').value.trim();

        let label = title || category;
        let extra = { category, title, purpose };

        if (category === 'Gmail') {
            const gmail = document.getElementById('addGmail').value.trim();
            label = title || gmail || 'Gmail';

            extra.gmail = gmail;
            extra.phone = document.getElementById('addPhone').value.trim();
            extra.recovery_gmail = document.getElementById('addRecoveryGmail').value.trim();
        } else {
            extra.used_email = document.getElementById('addUsedEmail').value.trim();
            extra.username = document.getElementById('addUsername').value.trim();
        }

        const data = {
            label: label,
            value: password,
            notes: purpose,
            extra: extra
        };

        if (!data.label || !data.value) {
            showToast('Title and password required', 'error');
            return;
        }

        fetch('/passwords/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrf
            },
            body: JSON.stringify(data)
        })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    showToast('Password saved', 'success');
                    closeAdd();
                    loadItems();
                } else {
                    showToast(d.error || 'Save failed', 'error');
                }
            });
    });

    function openEdit(id) {
        const item = allItems.find(i => i.id === id);
        if (!item) return;

        const extra = getExtra(item);
        const category = getCategory(item);

        document.getElementById('editId').value = item.id;
        document.getElementById('editCategory').value = category;
        document.getElementById('editTitle').value = extra.title || item.label || '';
        document.getElementById('editUsedEmail').value = extra.used_email || '';
        document.getElementById('editUsername').value = extra.username || '';
        document.getElementById('editGmail').value = extra.gmail || '';
        document.getElementById('editPhone').value = extra.phone || '';
        document.getElementById('editRecoveryGmail').value = extra.recovery_gmail || '';
        document.getElementById('editPassword').value = item.value || '';
        document.getElementById('editPurpose').value = extra.purpose || item.notes || '';

        toggleFields('edit');
        document.getElementById('editModal').classList.add('show');
    }

    function closeEdit() {
        document.getElementById('editModal').classList.remove('show');
    }

    document.getElementById('editForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const id = document.getElementById('editId').value;
        const category = document.getElementById('editCategory').value;
        const title = document.getElementById('editTitle').value.trim();
        const password = document.getElementById('editPassword').value.trim();
        const purpose = document.getElementById('editPurpose').value.trim();

        let label = title || category;
        let extra = { category, title, purpose };

        if (category === 'Gmail') {
            const gmail = document.getElementById('editGmail').value.trim();
            label = title || gmail || 'Gmail';

            extra.gmail = gmail;
            extra.phone = document.getElementById('editPhone').value.trim();
            extra.recovery_gmail = document.getElementById('editRecoveryGmail').value.trim();
        } else {
            extra.used_email = document.getElementById('editUsedEmail').value.trim();
            extra.username = document.getElementById('editUsername').value.trim();
        }

        const data = {
            label: label,
            value: password,
            notes: purpose,
            extra: extra
        };

        fetch('/passwords/update/' + id, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrf
            },
            body: JSON.stringify(data)
        })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    showToast('Password updated', 'success');
                    closeEdit();
                    loadItems();
                } else {
                    showToast(d.error || 'Update failed', 'error');
                }
            });
    });

    function openDetails(id) {
        const item = allItems.find(i => i.id === id);
        if (!item) return;

        currentDetailId = id;
        detailPasswordVisible = false;

        renderDetails();
        document.getElementById('detailsModal').classList.add('show');
    }

    function renderDetails() {
        const item = allItems.find(i => i.id === currentDetailId);
        if (!item) return;

        const extra = getExtra(item);
        const category = getCategory(item);
        const shownPassword = detailPasswordVisible ? escapeHtml(item.value) : maskPassword(item.value);

        document.getElementById('detailTitle').textContent = getCardTitle(item);

        if (category === 'Gmail') {
            document.getElementById('detailList').innerHTML = `
                <div class="detail-item"><span class="lbl">Gmail</span><span class="val">${escapeHtml(extra.gmail || '—')}</span></div>
                <div class="detail-item">
                    <span class="lbl">Password</span>
                    <span class="val pass-detail">
                        ${shownPassword}
                        <button class="icon-btn" onclick="toggleDetailPassword()">👁️</button>
                        <button class="icon-btn" onclick="copyPassword(${item.id})">📋</button>
                    </span>
                </div>
                <div class="detail-item"><span class="lbl">Phone Number</span><span class="val">${escapeHtml(extra.phone || '—')}</span></div>
                <div class="detail-item"><span class="lbl">Recovery Gmail</span><span class="val">${escapeHtml(extra.recovery_gmail || '—')}</span></div>
            `;
        } else {
            document.getElementById('detailList').innerHTML = `
                <div class="detail-item"><span class="lbl">Used Email</span><span class="val">${escapeHtml(extra.used_email || '—')}</span></div>
                <div class="detail-item"><span class="lbl">Username</span><span class="val">${escapeHtml(extra.username || '—')}</span></div>
                <div class="detail-item">
                    <span class="lbl">Password</span>
                    <span class="val pass-detail">
                        ${shownPassword}
                        <button class="icon-btn" onclick="toggleDetailPassword()">👁️</button>
                        <button class="icon-btn" onclick="copyPassword(${item.id})">📋</button>
                    </span>
                </div>
                <div class="detail-item"><span class="lbl">Purpose</span><span class="val">${escapeHtml(extra.purpose || item.notes || '—')}</span></div>
            `;
        }
    }

    function toggleDetailPassword() {
        detailPasswordVisible = !detailPasswordVisible;
        renderDetails();
    }

    function closeDetails() {
        document.getElementById('detailsModal').classList.remove('show');
        currentDetailId = null;
        detailPasswordVisible = false;
    }

    function copyPassword(id) {
        const item = allItems.find(i => i.id === id);
        if (!item) return;

        navigator.clipboard.writeText(item.value || '').then(() => {
            showToast('Password copied', 'success');
        });
    }

    function deleteItem(id) {
        if (!confirm('Delete this password?')) return;

        fetch('/passwords/delete/' + id, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': csrf }
        })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    showToast('Deleted', 'success');
                    loadItems();
                } else {
                    showToast(d.error || 'Delete failed', 'error');
                }
            });
    }

    function toggleFav(id) {
        fetch('/passwords/favorite/' + id, {
            method: 'POST',
            headers: { 'X-CSRFToken': csrf }
        })
            .then(r => r.json())
            .then(d => {
                if (d.success) loadItems();
            });
    }

    document.getElementById('searchPwd').addEventListener('input', renderItems);

    document.getElementById('addModal').addEventListener('click', function (e) {
        if (e.target === this) closeAdd();
    });

    document.getElementById('editModal').addEventListener('click', function (e) {
        if (e.target === this) closeEdit();
    });

    document.getElementById('detailsModal').addEventListener('click', function (e) {
        if (e.target === this) closeDetails();
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            closeAdd();
            closeEdit();
            closeDetails();
        }
    });

    loadItems();
</script>
{% endblock %}
