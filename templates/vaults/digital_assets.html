{% extends "base.html" %}

{% block title %}Digital Assets - Private Vault{% endblock %}

{% block content %}
<style>
    .vault-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
    }

    .vault-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .vault-header h1 {
        font-size: 28px;
        color: #eef4ff;
    }

    .vault-header .subtitle {
        color: #7b96c0;
        font-size: 14px;
    }

    .vault-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-primary {
        background: #2a6bff;
        color: white;
    }

    .btn-primary:hover {
        background: #3f7aff;
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(42, 107, 255, 0.3);
    }

    .btn-secondary {
        background: #1f3147;
        color: #b3ceff;
    }

    .btn-secondary:hover {
        background: #2a405a;
    }

    .search-container {
        margin-bottom: 24px;
        position: relative;
    }

    .search-container input {
        width: 100%;
        padding: 12px 16px 12px 44px;
        background: #0b1422;
        border: 1px solid #2a3f5c;
        border-radius: 12px;
        color: #f0f5ff;
        font-size: 15px;
        transition: all 0.2s;
    }

    .search-container input:focus {
        border-color: #4a85ff;
        outline: none;
        box-shadow: 0 0 0 3px rgba(42, 107, 255, 0.1);
    }

    .search-container .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #5a7a9a;
        font-size: 18px;
    }

    .vault-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 16px;
    }

    .vault-card {
        background: #0f1a2b;
        border: 1px solid #1a2a40;
        border-radius: 14px;
        padding: 16px;
        transition: all 0.2s;
        position: relative;
    }

    .vault-card:hover {
        border-color: #2a3f5c;
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .vault-card .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 10px;
    }

    .vault-card .card-title {
        font-size: 16px;
        font-weight: 600;
        color: #eef4ff;
    }

    .vault-card .card-badges {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
    }

    .vault-card .badge {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 500;
    }

    .badge-favorite {
        background: rgba(255, 193, 7, 0.15);
        color: #ffc107;
    }

    .badge-asset {
        background: rgba(156, 39, 176, 0.15);
        color: #ce93d8;
    }

    .vault-card .card-details {
        margin-bottom: 12px;
    }

    .vault-card .detail-row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 13px;
    }

    .vault-card .detail-row .label {
        color: #7b96c0;
    }

    .vault-card .detail-row .value {
        color: #eef4ff;
    }

    .vault-card .card-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn-sm {
        padding: 4px 12px;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-sm-primary {
        background: rgba(42, 107, 255, 0.15);
        color: #4a85ff;
    }

    .btn-sm-primary:hover {
        background: rgba(42, 107, 255, 0.25);
    }

    .btn-sm-success {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
    }

    .btn-sm-success:hover {
        background: rgba(76, 175, 80, 0.25);
    }

    .btn-sm-danger {
        background: rgba(239, 83, 80, 0.15);
        color: #ef5350;
    }

    .btn-sm-danger:hover {
        background: rgba(239, 83, 80, 0.25);
    }

    .btn-sm-warning {
        background: rgba(255, 193, 7, 0.15);
        color: #ffc107;
    }

    .btn-sm-warning:hover {
        background: rgba(255, 193, 7, 0.25);
    }

    .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 60px 20px;
        color: #5a7a9a;
    }

    .empty-state .empty-icon {
        font-size: 64px;
        margin-bottom: 16px;
    }

    .empty-state h3 {
        color: #7b96c0;
        margin-bottom: 8px;
    }

    .empty-state p {
        color: #5a7a9a;
    }

    @media (max-width: 600px) {
        .vault-container {
            padding: 16px;
        }

        .vault-header {
            flex-direction: column;
            align-items: stretch;
        }

        .vault-actions {
            justify-content: stretch;
        }

        .vault-actions .btn {
            flex: 1;
            text-align: center;
        }

        .vault-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="vault-container">
    <div class="vault-header">
        <div>
            <h1>💻 Digital Assets</h1>
            <div class="subtitle">Store and manage your digital assets, domains, and licenses</div>
        </div>
        <div class="vault-actions">
            <button class="btn btn-primary" onclick="addItem()">+ Add Asset</button>
            <button class="btn btn-secondary" onclick="exportItems()">📥 Export</button>
        </div>
    </div>

    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchAssets" placeholder="Search digital assets..." oninput="filterItems()">
    </div>

    <div id="assetsGrid" class="vault-grid">
        <div class="empty-state">
            <div class="empty-icon">💻</div>
            <h3>No digital assets</h3>
            <p>Add your first digital asset</p>
            <button class="btn btn-primary" onclick="addItem()" style="margin-top: 16px;">Add Asset</button>
        </div>
    </div>
</div>

<script>
    let assetItems = [];

    document.addEventListener('DOMContentLoaded', function () {
        loadItems();
    });

    function loadItems() {
        fetch('/digital-assets/list')
            .then(response => response.json())
            .then(data => {
                assetItems = data.items || [];
                renderItems(assetItems);
            })
            .catch(error => {
                console.error('Error loading assets:', error);
                showNotification('Error loading digital assets', 'error');
            });
    }

    function renderItems(items) {
        const grid = document.getElementById('assetsGrid');

        if (!items || items.length === 0) {
            grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">💻</div>
                <h3>No digital assets found</h3>
                <p>Add your first digital asset</p>
                <button class="btn btn-primary" onclick="addItem()" style="margin-top: 16px;">Add Asset</button>
            </div>
        `;
            return;
        }

        grid.innerHTML = items.map(item => {
            const extra = item.extra || {};
            return `
            <div class="vault-card" data-id="${item.id}">
                <div class="card-header">
                    <div class="card-title">${item.label}</div>
                    <div class="card-badges">
                        ${item.is_favorite ? '<span class="badge badge-favorite">⭐ Favorite</span>' : ''}
                        <span class="badge badge-asset">${extra.asset_type || 'Asset'}</span>
                    </div>
                </div>
                <div class="card-details">
                    ${extra.asset_type ? `<div class="detail-row"><span class="label">Type</span><span class="value">${extra.asset_type}</span></div>` : ''}
                    ${extra.provider ? `<div class="detail-row"><span class="label">Provider</span><span class="value">${extra.provider}</span></div>` : ''}
                    ${extra.asset_url ? `<div class="detail-row"><span class="label">URL</span><span class="value" style="font-size: 12px; word-break: break-all;">${extra.asset_url}</span></div>` : ''}
                </div>
                <div class="card-actions">
                    <button class="btn-sm btn-sm-primary" onclick="viewItem(${item.id})">👁️ View</button>
                    ${extra.asset_url ? `<button class="btn-sm btn-sm-success" onclick="openUrl('${extra.asset_url}')">🔗 Open</button>` : ''}
                    <button class="btn-sm btn-sm-warning" onclick="toggleFavorite(${item.id})">⭐</button>
                    <button class="btn-sm btn-sm-danger" onclick="deleteItem(${item.id})">🗑️</button>
                </div>
            </div>
        `;
        }).join('');
    }

    function filterItems() {
        const query = document.getElementById('searchAssets').value.toLowerCase();
        const filtered = assetItems.filter(item =>
            item.label.toLowerCase().includes(query) ||
            (item.extra && item.extra.provider && item.extra.provider.toLowerCase().includes(query)) ||
            (item.extra && item.extra.asset_type && item.extra.asset_type.toLowerCase().includes(query))
        );
        renderItems(filtered);
    }

    function addItem() {
        window.location.href = '/vault/add?category=digital_assets';
    }

    function viewItem(id) {
        window.location.href = `/vault/view/${id}`;
    }

    function openUrl(url) {
        window.open(url, '_blank');
    }

    function toggleFavorite(id) {
        fetch(`/digital-assets/favorite/${id}`, {
            method: 'POST'
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification('Favorite updated', 'success');
                    loadItems();
                }
            })
            .catch(error => {
                showNotification('Error updating favorite', 'error');
                console.error('Error:', error);
            });
    }

    function deleteItem(id) {
        if (confirm('Are you sure you want to delete this digital asset?')) {
            fetch(`/digital-assets/delete/${id}`, {
                method: 'DELETE'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showNotification('Asset deleted successfully', 'success');
                        loadItems();
                    } else {
                        showNotification('Error deleting asset', 'error');
                    }
                })
                .catch(error => {
                    showNotification('Error deleting asset', 'error');
                    console.error('Error:', error);
                });
        }
    }

    function exportItems() {
        fetch('/digital-assets/export')
            .then(response => response.blob())
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `digital_assets_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                showNotification('Assets exported successfully!', 'success');
            })
            .catch(error => {
                showNotification('Error exporting assets', 'error');
                console.error('Error:', error);
            });
    }

    function showNotification(message, type) {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => {
            notification.remove();
        }, 4000);
    }
</script>
{% endblock %}
