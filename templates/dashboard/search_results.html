{% extends "base.html" %}

{% block title %}Search Results - Private Vault{% endblock %}

{% block content %}
<div class="search-results-container">
    <div class="page-header">
        <h1>🔍 Search Results</h1>
        <p class="subtitle">Results for: "<span id="searchQuery">{{ query }}</span>"</p>
    </div>

    <div class="search-summary">
        <div class="result-stats">
            <span id="resultCount">0</span> results found
        </div>
        <div class="search-actions">
            <button class="btn btn-secondary" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
        </div>
    </div>

    <div class="results-container">
        <div id="resultsList" class="results-grid">
            <p class="text-muted">Loading results...</p>
        </div>
    </div>

    <div class="pagination" id="pagination">
        <button class="btn-sm btn-secondary" onclick="loadPage('prev')">Previous</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button class="btn-sm btn-secondary" onclick="loadPage('next')">Next</button>
    </div>
</div>

<!-- View Item Modal -->
<div id="viewModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="viewTitle">Item Details</h3>
            <button class="close-btn" onclick="closeModal('viewModal')">&times;</button>
        </div>
        <div class="modal-body" id="viewContent">
            <!-- Dynamic content -->
        </div>
    </div>
</div>

{% block scripts %}
<script>
    let currentPage = 1;
    let totalPages = 1;
    let currentResults = [];

    document.addEventListener('DOMContentLoaded', function () {
        const query = document.getElementById('searchQuery').textContent;
        if (query && query.trim()) {
            performSearch(query);
        } else {
            document.getElementById('resultsList').innerHTML = '<p class="text-muted">No search query provided</p>';
        }
    });

    function performSearch(query, page = 1) {
        fetch(`/dashboard/search?q=${encodeURIComponent(query)}&page=${page}`)
            .then(response => response.json())
            .then(data => {
                currentResults = data.items || [];
                renderResults(currentResults);
                updatePagination(data);
                document.getElementById('resultCount').textContent = data.total || 0;
            })
            .catch(error => {
                console.error('Error performing search:', error);
                document.getElementById('resultsList').innerHTML = '<p class="text-danger">Error loading results</p>';
            });
    }

    function renderResults(items) {
        const container = document.getElementById('resultsList');

        if (!items || items.length === 0) {
            container.innerHTML = `
            <div class="no-results">
                <span class="no-results-icon">🔍</span>
                <h3>No results found</h3>
                <p>Try adjusting your search terms</p>
            </div>
        `;
            return;
        }

        container.innerHTML = items.map(item => `
        <div class="result-card" onclick="viewItem(${item.id})">
            <div class="result-card-header">
                <span class="result-category">${getCategoryIcon(item.category)} ${item.category}</span>
                ${item.favorite ? '<span class="favorite-star">⭐</span>' : ''}
            </div>
            <div class="result-card-body">
                <div class="result-label">${highlightText(item.label, document.getElementById('searchQuery').textContent)}</div>
                <div class="result-value">${highlightText(maskValue(item.value), document.getElementById('searchQuery').textContent)}</div>
                ${item.notes ? `<div class="result-notes">${highlightText(item.notes, document.getElementById('searchQuery').textContent)}</div>` : ''}
            </div>
            <div class="result-card-footer">
                <span class="result-time">${formatRelativeTime(item.updated_at)}</span>
                <div class="result-actions">
                    <button class="btn-sm btn-primary" onclick="event.stopPropagation(); copyValue('${item.value}')">📋 Copy</button>
                    <button class="btn-sm btn-secondary" onclick="event.stopPropagation(); viewItem(${item.id})">👁️ View</button>
                </div>
            </div>
        </div>
    `).join('');
    }

    function updatePagination(data) {
        totalPages = data.pages || 1;
        const pageInfo = document.getElementById('pageInfo');
        pageInfo.textContent = `Page ${data.current_page || 1} of ${totalPages}`;
        currentPage = data.current_page || 1;
    }

    function loadPage(direction) {
        let newPage = currentPage;
        if (direction === 'prev' && currentPage > 1) {
            newPage = currentPage - 1;
        } else if (direction === 'next' && currentPage < totalPages) {
            newPage = currentPage + 1;
        }
        if (newPage !== currentPage) {
            currentPage = newPage;
            const query = document.getElementById('searchQuery').textContent;
            performSearch(query, currentPage);
        }
    }

    function viewItem(id) {
        fetch(`/vault/view/${id}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('viewTitle').textContent = data.label || 'Item Details';
                document.getElementById('viewContent').innerHTML = `
                <div class="view-details">
                    <div class="detail-row">
                        <label>Category:</label>
                        <span>${getCategoryIcon(data.category)} ${data.category}</span>
                    </div>
                    <div class="detail-row">
                        <label>Label:</label>
                        <span>${data.label}</span>
                    </div>
                    <div class="detail-row">
                        <label>Value:</label>
                        <div class="value-display">
                            <span id="viewValue">${maskValue(data.value)}</span>
                            <button class="btn-sm btn-primary" onclick="toggleReveal('${data.value}')">👁️ Reveal</button>
                            <button class="btn-sm btn-primary" onclick="copyValue('${data.value}')">📋 Copy</button>
                        </div>
                    </div>
                    ${data.extra ? Object.entries(data.extra).map(([key, val]) => `
                        <div class="detail-row">
                            <label>${formatKey(key)}:</label>
                            <span>${val}</span>
                        </div>
                    `).join('') : ''}
                    ${data.notes ? `
                        <div class="detail-row">
                            <label>Notes:</label>
                            <span>${data.notes}</span>
                        </div>
                    ` : ''}
                    <div class="detail-row">
                        <label>Created:</label>
                        <span>${formatDate(data.created_at)}</span>
                    </div>
                    <div class="detail-row">
                        <label>Updated:</label>
                        <span>${formatDate(data.updated_at)}</span>
                    </div>
                </div>
                <div class="view-actions">
                    <button class="btn btn-secondary" onclick="closeModal('viewModal')">Close</button>
                    <button class="btn btn-primary" onclick="editItem(${data.id})">✏️ Edit</button>
                    <button class="btn btn-danger" onclick="deleteItem(${data.id})">🗑️ Delete</button>
                </div>
            `;
                document.getElementById('viewModal').classList.remove('hidden');
            })
            .catch(error => {
                console.error('Error viewing item:', error);
                showNotification('Error loading item details', 'error');
            });
    }

    function closeModal(id) {
        document.getElementById(id).classList.add('hidden');
    }

    function toggleReveal(value) {
        const span = document.getElementById('viewValue');
        if (span.textContent === maskValue(value)) {
            span.textContent = value;
            setTimeout(() => {
                span.textContent = maskValue(value);
            }, 5000);
        } else {
            span.textContent = maskValue(value);
        }
    }

    function editItem(id) {
        window.location.href = `/vault/edit/${id}`;
    }

    function deleteItem(id) {
        if (confirm('Are you sure you want to delete this item?')) {
            fetch(`/vault/delete/${id}`, {
                method: 'DELETE'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showNotification('Item deleted successfully', 'success');
                        closeModal('viewModal');
                        const query = document.getElementById('searchQuery').textContent;
                        performSearch(query, currentPage);
                    } else {
                        showNotification('Error deleting item', 'error');
                    }
                })
                .catch(error => {
                    showNotification('Error deleting item', 'error');
                    console.error('Error deleting item:', error);
                });
        }
    }

    function copyValue(value) {
        navigator.clipboard.writeText(value).then(() => {
            showNotification('Copied to clipboard!', 'success');
        }).catch(() => {
            const textarea = document.createElement('textarea');
            textarea.value = value;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showNotification('Copied to clipboard!', 'success');
        });
    }

    function getCategoryIcon(category) {
        const icons = {
            'identity': '🪪',
            'banking': '🏦',
            'passwords': '🔑',
            'notes': '📝',
            'documents': '📄',
            'emergency': '🚨',
            'digital_assets': '💻'
        };
        return icons[category] || '📦';
    }

    function maskValue(value) {
        if (!value) return '';
        if (value.length <= 4) return '••••';
        return '••••' + value.slice(-4);
    }

    function highlightText(text, query) {
        if (!text || !query) return text || '';
        const regex = new RegExp(`(${query})`, 'gi');
        return text.replace(regex, '<mark>$1</mark>');
    }

    function formatRelativeTime(timestamp) {
        const now = new Date();
        const time = new Date(timestamp);
        const diff = Math.floor((now - time) / 1000);

        if (diff < 60) return 'Just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
        return time.toLocaleDateString();
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function formatKey(key) {
        return key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }

    function showNotification(message, type) {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => {
            notification.remove();
        }, 5000);
    }
</script>
{% endblock %}
