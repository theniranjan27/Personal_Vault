{% extends "auth_base.html" %}

{% block title %}Master Password{% endblock %}

{% block subtitle %}Enter your master password{% endblock %}

{% block content %}
<form id="masterForm">
    <div class="field">
        <label for="masterPassword">Master Password</label>
        <input type="password" id="masterPassword" placeholder="Enter your master password" autofocus required>
    </div>

    <button type="submit" class="btn-primary" id="loginBtn">Continue →</button>
</form>

<script>
    document.getElementById('masterForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const password = document.getElementById('masterPassword').value;
        const btn = document.getElementById('loginBtn');
        const error = document.getElementById('loginError');

        if (!password) {
            error.textContent = 'Please enter your master password';
            error.classList.add('show');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Verifying...';
        error.classList.remove('show');

        fetch('/auth/verify-master', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ master_password: password })
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect || '/auth/pin';
                } else {
                    error.textContent = data.error || 'Invalid master password';
                    error.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = 'Continue →';
                    document.getElementById('masterPassword').value = '';
                    document.getElementById('masterPassword').focus();
                }
            })
            .catch(() => {
                error.textContent = 'An error occurred. Please try again.';
                error.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Continue →';
            });
    });
</script>
{% endblock %}
